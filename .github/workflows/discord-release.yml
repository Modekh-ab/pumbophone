name: discord-release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify-discord:
    name: Send release to Discord
    runs-on: ubuntu-latest
    timeout-minutes: 2

    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      WEBHOOK_NAME: "Сборки Пумбофона"

      DISCORD_NOTIFY_USER_IDS: "1296386810791989248,1509977878174105733,1402310879000793145,1511398872428183763"

    steps:
      - name: validate-webhook-secret
        shell: bash
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::error::Repository secret DISCORD_WEBHOOK_URL is missing."
            exit 1
          fi

      - name: send-ds-notification
        shell: bash
        run: |
          python3 <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request
          from pathlib import Path

          event_path = Path(os.environ["GITHUB_EVENT_PATH"])
          event = json.loads(event_path.read_text(encoding="utf-8"))

          repository = event["repository"]

          if event.get("release"):
              release = event["release"]
          else:
              release = {
                  "name": "Тестовое уведомление",
                  "tag_name": "test",
                  "html_url": repository.get("html_url"),
                  "body": (
                      "Ручная проверка GitHub Actions завершена. "
                      "Webhook подключён к Discord правильно."
                  ),
                  "prerelease": False,
                  "assets": []
              }

          release_name = (
              release.get("name")
              or release.get("tag_name")
              or "Без названия"
          )
          release_url = (
              release.get("html_url")
              or repository.get("html_url")
          )
          release_body = (release.get("body") or "").strip()
          prerelease = bool(release.get("prerelease"))

          if not release_body:
              release_body = "Изменения не указаны."

          raw_user_ids = os.environ.get(
              "DISCORD_NOTIFY_USER_IDS",
              ""
          )

          notify_user_ids = [
              user_id.strip()
              for user_id in raw_user_ids.split(",")
              if user_id.strip()
          ]

          placeholder_ids = {
              "PASTE_MONDLESS_USER_ID_HERE"
          }

          notify_user_ids = [
              user_id
              for user_id in notify_user_ids
              if user_id not in placeholder_ids
          ]

          invalid_user_ids = [
              user_id
              for user_id in notify_user_ids
              if not user_id.isdigit()
          ]

          if invalid_user_ids:
              print(
                  "Invalid Discord user IDs: "
                  + ", ".join(invalid_user_ids),
                  file=sys.stderr
              )
              sys.exit(1)

          mentions = " ".join(
              f"<@{user_id}>"
              for user_id in notify_user_ids
          )

          assets = release.get("assets") or []
          asset_lines = []

          for asset in assets[:5]:
              name = str(
                  asset.get("name") or "Скачать файл"
              ).replace("]", r"\]")

              if len(name) > 120:
                  name = name[:117] + "..."

              url = asset.get("browser_download_url")
              size_bytes = int(asset.get("size") or 0)

              if size_bytes >= 1024 * 1024:
                  size = f"{size_bytes / (1024 * 1024):.1f} МБ"
              elif size_bytes >= 1024:
                  size = f"{size_bytes / 1024:.1f} КБ"
              else:
                  size = f"{size_bytes} Б"

              if url:
                  asset_lines.append(
                      f"[{name}]({url}) — {size}"
                  )

          if len(assets) > 5:
              asset_lines.append(
                  f"И ещё файлов: {len(assets) - 5}"
              )

          if asset_lines:
              assets_text = "\n".join(asset_lines)
          else:
              assets_text = (
                  "Прикреплённых файлов нет — "
                  f"[открыть страницу релиза]({release_url})"
              )

          release_kind = (
              "ПРЕРЕЛИЗ"
              if prerelease
              else "НОВАЯ ВЕРСИЯ"
          )

          header = (
              f"## {release_kind}: "
              f"[{release_name}]({release_url})\n\n"
          )

          files_section = (
              "\n\n**Файлы Апельштейна**\n"
              + assets_text
          )

          mentions_section = (
              "\n\n" + mentions
              if mentions
              else ""
          )

          reserved_length = (
              len(header)
              + len(files_section)
              + len(mentions_section)
          )

          max_body_length = 2000 - reserved_length

          if max_body_length < 0:
              print(
                  "Release file list and mentions exceed "
                  "Discord's 2000-character limit.",
                  file=sys.stderr
              )
              sys.exit(1)

          if len(release_body) > max_body_length:
              suffix = (
                  "\n\n…Полный список изменений — "
                  f"[на странице релиза]({release_url})"
              )

              trim_to = max(
                  0,
                  max_body_length - len(suffix)
              )

              release_body = (
                  release_body[:trim_to].rstrip()
                  + suffix
              )

          message_content = (
              header
              + release_body
              + files_section
              + mentions_section
          )

          payload = {
              "username": os.environ.get(
                  "WEBHOOK_NAME",
                  "GitHub Releases"
              ),
              "avatar_url": repository.get(
                  "owner",
                  {}
              ).get("avatar_url"),
              "content": message_content,

              "flags": 4,

              "allowed_mentions": {
                  "parse": [],
                  "users": notify_user_ids
              }
          }

          webhook_url = os.environ.get(
              "DISCORD_WEBHOOK_URL",
              ""
          ).strip()

          if not webhook_url:
              print(
                  "DISCORD_WEBHOOK_URL is empty.",
                  file=sys.stderr
              )
              sys.exit(1)

          separator = "&" if "?" in webhook_url else "?"
          request_url = webhook_url + separator + "wait=true"

          request = urllib.request.Request(
              request_url,
              data=json.dumps(
                  payload,
                  ensure_ascii=False
              ).encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": (
                      "GitHub-Actions-Discord-Release"
                  )
              },
              method="POST"
          )

          try:
              with urllib.request.urlopen(
                  request,
                  timeout=30
              ) as response:
                  response_body = response.read().decode(
                      "utf-8",
                      errors="replace"
                  )

                  if response.status not in (200, 204):
                      print(
                          f"Discord returned HTTP "
                          f"{response.status}: "
                          f"{response_body}",
                          file=sys.stderr
                      )
                      sys.exit(1)

                  print(
                      "Discord release notification sent "
                      f"successfully. HTTP {response.status}"
                  )
          except urllib.error.HTTPError as error:
              details = error.read().decode(
                  "utf-8",
                  errors="replace"
              )
              print(
                  f"Discord webhook failed. "
                  f"HTTP {error.code}: {details}",
                  file=sys.stderr
              )
              sys.exit(1)
          except urllib.error.URLError as error:
              print(
                  f"Cannot reach Discord webhook: {error}",
                  file=sys.stderr
              )
              sys.exit(1)
          PY
