name: archives-auto-build

on:
  workflow_dispatch: {}
  release:
    types:
      - published
      - edited

concurrency:
  group: archives-auto-build-${{ github.event.release.id || github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-archives:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.action == 'published' ||
      github.event.changes.body ||
      github.event.changes.name ||
      github.event.changes.prerelease ||
      github.event.changes.target_commitish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate auto archives
        run: node scripts/generate-auto-archives.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-discord:
    needs: build-archives
    uses: ./.github/workflows/discord-release.yml
    with:
      source: archives
      release_id: ${{ format('{0}', github.event.release.id) }}
    secrets: inherit
